<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxe - E-commerce Premium</title>
    <link rel="stylesheet" href="../styles/style.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-container">
            <div class="logo">LUXE</div>
            <nav class="nav">
                <a href="#" class="nav-link">Coleção</a>
                <a href="#" class="nav-link">Sobre</a>
                <a href="#" class="nav-link">Contato</a>
            </nav>
            <button class="cart-toggle" id="cartToggle">
                <span class="cart-icon">🛍</span>
                <span class="cart-count" id="cartCount">0</span>
            </button>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <h1 class="hero-title">Elegância Redefinida</h1>
            <p class="hero-subtitle">Produtos premium selecionados com excelência</p>
        </div>
    </section>

    <!-- Products Grid -->
    <main class="container">
        <section class="products-section">
            <div class="products-grid" id="productsGrid"></div>
        </section>
    </main>

    <!-- Shopping Cart Sidebar -->
    <aside class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            <h2>Seu Carrinho</h2>
            <button class="close-cart" id="closeCart">✕</button>
        </div>
        <div class="cart-items" id="cartItems"></div>
        <div class="cart-footer">
            <div class="cart-total">
                <span>Total:</span>
                <span class="total-price" id="totalPrice">R$ 0,00</span>
            </div>
            <button class="checkout-btn">Finalizar Compra</button>
        </div>
    </aside>

    <!-- Cart Overlay -->
    <div class="cart-overlay" id="cartOverlay"></div>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2026 LUXE. Todos os direitos reservados.</p>
            <p>Design minimalista | Qualidade premium</p>
        </div>
    </footer>

    <script src="../scripts/script.js"></script>
</body>
</html>
